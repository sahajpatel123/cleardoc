name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    env:
      # A dummy DATABASE_URL is required for `tsc` to not complain about
      # the missing env, and for the prisma client generate step to not
      # crash. We never connect to it.
      DATABASE_URL: "postgresql://postgres:postgres@127.0.0.1:5432/cleardoc"
      NEXTAUTH_SECRET: "ci-only-secret-32-chars-long-xxxxxx"
      NEXTAUTH_URL: "http://localhost:3000"
      NVIDIA_API_KEY: "ci-placeholder"
      STRIPE_SECRET_KEY: "sk_test_placeholder_for_ci_only"
      STRIPE_WEBHOOK_SECRET: "whsec_placeholder_for_ci_only"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder_for_ci_only"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run audit
